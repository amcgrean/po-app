<div id="shelfTagsTab" class="tab-content hidden">
    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
            <h2 style="margin: 0;">Shelf Tag Printing</h2>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <label>Branch
                    <select id="shelfTagBranch" class="form-control"
                        style="width: auto; display: inline-block; margin-left: 0.5rem;">
                        <option value="">Select...</option>
                    </select>
                </label>
                <label>Size
                    <select id="shelfTagSize" class="form-control"
                        style="width: auto; display: inline-block; margin-left: 0.5rem;">
                        <option value="3x5">3×5 in</option>
                        <option value="2x3" selected>2×3 in</option>
                    </select>
                </label>
                <label>Qty
                    <input id="shelfTagQty" type="number" value="1" min="1" style="width: 64px;" class="form-control">
                </label>
                <button id="printShelfTagsBtn" class="btn btn-primary">Print Direct (ZPL)</button>
                <button id="shelfTagSettingsBtn" class="btn btn-secondary">⚙️</button>
            </div>
        </div>

        <div class="two-col" style="gap: 1.5rem;">
            <!-- Left: Locations -->
            <div>
                <h3 style="font-size: 1rem; margin-bottom: 0.5rem;">Locations</h3>
                <input id="searchShelfTagLoc" class="form-control" placeholder="Search locations..."
                    style="margin-bottom: 0.5rem;">
                <div id="shelfTagLocations"
                    style="border: 1px solid #cbd5e1; border-radius: 0.5rem; height: 220px; overflow: auto; background: #f8fafc;">
                </div>

                <h3 style="font-size: 1rem; margin: 1rem 0 0.5rem;">Sublocations</h3>
                <input id="searchShelfTagSub" class="form-control" placeholder="Search sublocations..."
                    style="margin-bottom: 0.5rem;">
                <div id="shelfTagSublocations"
                    style="border: 1px solid #cbd5e1; border-radius: 0.5rem; height: 220px; overflow: auto; background: #f8fafc;">
                </div>
            </div>

            <!-- Right: Items Table -->
            <div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                    <h3 style="font-size: 1rem; margin: 0;">Items (<span id="shelfTagItemCount">0</span>)</h3>
                    <input id="searchShelfTagItems" class="form-control" placeholder="Search items..."
                        style="width: 300px;">
                </div>

                <div style="margin-bottom: 0.5rem;">
                    <label style="font-size: 0.875rem;">
                        <input type="checkbox" id="selectAllShelfTags"> Select All Visible
                    </label>
                </div>

                <div style="max-height: 500px; overflow: auto; border: 1px solid #cbd5e1; border-radius: 0.5rem;">
                    <table class="po-table" style="margin: 0;">
                        <thead>
                            <tr>
                                <th style="width: 40px;">✓</th>
                                <th>Item</th>
                                <th>Description</th>
                                <th>Size</th>
                                <th>Location</th>
                                <th>Subloc</th>
                            </tr>
                        </thead>
                        <tbody id="shelfTagItemsTable">
                            <tr>
                                <td colspan="6" style="text-align: center; padding: 2rem; color: #64748b;">Select a
                                    branch and locations to load items</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="shelfTagSettingsModal" class="hidden"
        style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2000;">
        <div style="max-width: 520px; margin: 4rem auto; background: white; border-radius: 0.5rem; padding: 1.5rem;">
            <h3>Printer Settings</h3>
            <div class="form-group">
                <label>Printer</label>
                <select id="shelfTagPrinter" class="form-control"></select>
            </div>
            <div class="form-group">
                <label>DPI</label>
                <select id="shelfTagDPI" class="form-control">
                    <option value="203" selected>203 dpi</option>
                    <option value="300">300 dpi</option>
                </select>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1rem;">
                <button id="saveShelfTagSettings" class="btn btn-primary">Save</button>
                <button id="closeShelfTagSettings" class="btn btn-secondary">Close</button>
            </div>
        </div>
    </div>
</div>
